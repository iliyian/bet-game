<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetGame | 翻倍还是归零</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif;
            background: radial-gradient(circle at top right, #eff6ff, #f8fafc);
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .bento-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bento-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.05);
        }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .toast {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            border-radius: 1rem;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen text-slate-900">
    <div id="toast-container"></div>

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass rounded-2xl px-6 py-3 shadow-sm">
            <div class="flex items-center gap-3 font-extrabold text-2xl text-blue-600 tracking-tight">
                <div class="bg-blue-600 p-1.5 rounded-lg">
                    <i data-lucide="zap" class="w-6 h-6 text-white fill-white"></i>
                </div>
                <span>BetGame</span>
            </div>
            <div id="user-nav" class="flex items-center gap-6">
                <!-- User Info Injection -->
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-12 gap-6">
        <!-- Main Betting Area (Bento Grid) -->
        <div class="col-span-12 lg:col-span-8 space-y-6">

            <!-- Hero Section: Countdown -->
            <div class="bento-card glass rounded-3xl p-8 flex flex-col items-center justify-center relative overflow-hidden min-h-[320px]">
                <div id="ping-indicator" class="absolute top-6 right-8 flex items-center gap-1.5 text-slate-400 font-semibold text-sm tabular-nums transition-colors">
                    <span id="ping-dot" class="w-2 h-2 rounded-full bg-slate-300 transition-colors"></span>
                    <span id="ping-value">--</span><span class="text-[10px]">ms</span>
                </div>

                <div class="relative flex items-center justify-center">
                    <svg class="w-48 h-48">
                        <circle class="text-slate-100" stroke-width="8" stroke="currentColor" fill="transparent" r="80" cx="96" cy="96"/>
                        <circle id="progress-circle" class="text-blue-600 progress-ring__circle" stroke-width="8" stroke-dasharray="502.6" stroke-dashoffset="0" stroke-linecap="round" stroke="currentColor" fill="transparent" r="80" cx="96" cy="96"/>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="countdown" class="text-5xl font-black tabular-nums">10.0</span>
                        <span class="text-xs font-bold text-slate-400 uppercase">秒后结算</span>
                    </div>
                </div>
                <div id="last-result" class="mt-4 font-bold text-lg h-8 animate-pulse"></div>
            </div>

            <!-- Betting Controls -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Input Card -->
                <div class="bento-card glass rounded-3xl p-6 flex flex-col justify-between">
                    <div>
                        <h3 class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-wider">投注金额</h3>
                        <div class="relative">
                            <input type="number" id="bet-amount" value="100" class="w-full bg-slate-50/50 border-2 border-slate-100 rounded-2xl px-6 py-4 text-3xl font-bold focus:border-blue-500 focus:outline-none transition-all">
                            <span class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 font-bold text-xl">$</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-4 gap-2 mt-4" id="percent-btns">
                        <button onclick="setBetPercent(10)" data-pct="10" class="py-2 rounded-xl bg-white border border-slate-100 hover:border-blue-200 hover:bg-blue-50 text-xs font-bold transition-all">10%</button>
                        <button onclick="setBetPercent(25)" data-pct="25" class="py-2 rounded-xl bg-white border border-slate-100 hover:border-blue-200 hover:bg-blue-50 text-xs font-bold transition-all">25%</button>
                        <button onclick="setBetPercent(50)" data-pct="50" class="py-2 rounded-xl bg-white border border-slate-100 hover:border-blue-200 hover:bg-blue-50 text-xs font-bold transition-all">50%</button>
                        <button onclick="setBetPercent(100)" data-pct="100" class="py-2 rounded-xl bg-slate-900 text-white text-xs font-bold hover:bg-slate-800 transition-all">100%</button>
                    </div>
                </div>

                <!-- Action Card -->
                <div class="bento-card glass rounded-3xl p-6 flex flex-col justify-between bg-gradient-to-br from-blue-600 to-blue-700 text-white border-none">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-sm font-bold opacity-80 uppercase tracking-wider">预期收益</h3>
                            <i data-lucide="info" class="w-4 h-4 opacity-60"></i>
                        </div>
                        <div class="text-4xl font-black" id="payout-preview">$200.00</div>
                        <p class="text-xs opacity-70 mt-1">胜率 50.0%</p>
                    </div>
                    <button onclick="placeBet()" id="bet-btn" class="w-full bg-white text-blue-600 font-bold py-4 rounded-2xl shadow-xl hover:shadow-blue-900/20 transform active:scale-[0.98] transition-all mt-4 disabled:opacity-50">
                        立即投注
                    </button>
                </div>
            </div>

            <!-- Current Round Bets -->
            <div class="bento-card glass rounded-3xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg flex items-center gap-2">
                        <i data-lucide="users" class="w-5 h-5 text-blue-500"></i>
                        本轮下注
                    </h3>
                    <span id="bets-summary" class="text-xs text-slate-400 font-medium"></span>
                </div>
                <div id="current-bets-list" class="space-y-2 min-h-[2.5rem] flex flex-col justify-center">
                    <p class="text-sm text-slate-300 text-center font-medium">暂无下注</p>
                </div>
            </div>

            <!-- History Bento Item -->
            <div class="bento-card glass rounded-3xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-lg flex items-center gap-2">
                        <i data-lucide="trello" class="w-5 h-5 text-blue-500"></i>
                        最近开奖
                    </h3>
                    <span class="text-xs text-slate-300 font-medium flex items-center gap-1">旧 <i data-lucide="arrow-right" class="w-3 h-3"></i> 新</span>
                </div>
                <div id="history-list" class="grid grid-cols-5 md:grid-cols-10 gap-3 items-end">
                    <!-- Dynamic -->
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="col-span-12 lg:col-span-4 space-y-6">
            <!-- Leaderboard -->
            <div class="bento-card glass rounded-3xl p-6 h-full">
                <h3 class="font-bold text-xl mb-6 flex items-center gap-3">
                    <i data-lucide="crown" class="w-6 h-6 text-yellow-500"></i>
                    玩家排行榜
                </h3>
                <div id="leaderboard" class="space-y-1">
                    <!-- Dynamic -->
                </div>
                <button onclick="resetBalance()" id="reset-btn" class="hidden w-full mt-6 py-3 rounded-xl border-2 border-dashed border-blue-200 text-blue-500 font-bold hover:bg-blue-50 transition-all text-sm">
                    余额不足？重置为 $1,000
                </button>
            </div>
        </div>
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-md">
        <div class="bg-white rounded-[2rem] p-10 max-w-md w-full shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="mail" class="w-8 h-8 text-blue-600"></i>
                </div>
                <h2 id="modal-title" class="text-3xl font-extrabold tracking-tight">登录游戏</h2>
                <p class="text-slate-500 mt-2">输入邮箱以继续</p>
            </div>

            <div id="register-step" class="space-y-4">
                <input type="email" id="email-input" placeholder="name@example.com" class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none transition-all font-medium">
                <div id="turnstile-container" class="flex justify-center"></div>
                <button onclick="startRegister()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">发送验证码</button>
            </div>

            <div id="verify-step" class="hidden space-y-6">
                <div class="flex flex-col gap-2">
                    <input type="text" id="otp-input" placeholder="000000" maxlength="6" class="w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center text-4xl font-black tracking-[0.3em] focus:border-blue-500 focus:outline-none">
                    <p class="text-center text-xs text-slate-400 font-medium">验证码已发送至您的邮箱</p>
                </div>
                <button onclick="verifyCode()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all">验证并登录</button>
            </div>
        </div>
    </div>

    <!-- Username Modal -->
    <div id="username-modal" class="fixed inset-0 z-[101] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white rounded-[2rem] p-10 max-w-md w-full shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="user-plus" class="w-8 h-8 text-blue-600"></i>
                </div>
                <h2 class="text-3xl font-extrabold tracking-tight">设置用户名</h2>
                <p class="text-slate-500 mt-2">首次登录，请给自己起个响亮的名字</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="username-input" placeholder="3-20个字符" class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none transition-all font-medium">
                <button onclick="submitUsername()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">确认开启</button>
            </div>
        </div>
    </div>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"></script>
    <script>
        let currentUser = null;
        let gameState = {};
        let lastResultId = null;
        let activeBetPercent = null; // Track last selected bet percentage

        // Escape HTML to prevent XSS from user-controlled data.
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
        const circle = document.getElementById('progress-circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'bg-red-500' : 'bg-green-500'}`;
            toast.innerText = msg;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function setProgress(percent) {
            const offset = circumference - (percent / 100 * circumference);
            circle.style.strokeDashoffset = offset;
        }

        async function init() {
            lucide.createIcons();
            document.getElementById('bet-amount').addEventListener('input', (e) => {
                // If the user is typing manually (not triggered by applyBetAmount),
                // clear the tracked percentage so we don't override their value later.
                if (!e.isTrusted) {
                    // Programmatic event from applyBetAmount — just update preview.
                } else {
                    activeBetPercent = null;
                    highlightPercentBtn();
                }
                const val = parseFloat(e.target.value) || 0;
                document.getElementById('payout-preview').innerText = '$' + (val * 2).toLocaleString(undefined, {minimumFractionDigits: 2});
            });
            await fetchUser();
            connectWebSocket();
            requestAnimationFrame(updateFrame);
        }

        async function fetchUser() {
            try {
                const res = await fetch('/api/me');
                if (res.ok) {
                    currentUser = await res.json();
                    if (!currentUser.username) {
                        document.getElementById('username-modal').classList.remove('hidden');
                    }
                } else {
                    currentUser = null;
                }
                updateUserInfo();
                applyBetAmount();
            } catch (e) { currentUser = null; }
        }

        async function submitUsername() {
            const username = document.getElementById('username-input').value;
            const res = await fetch('/api/me/username', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            if (res.ok) {
                showToast("用户名设置成功");
                document.getElementById('username-modal').classList.add('hidden');
                await fetchUser();
            } else {
                showToast(await res.text(), true);
            }
        }

        function updateUserInfo() {
            const nav = document.getElementById('user-nav');
            if (currentUser) {
                const displayName = escapeHTML(currentUser.username || currentUser.email.split('@')[0]);
                nav.innerHTML = `
                    <div class="flex items-center gap-4 bg-slate-50 px-4 py-2 rounded-xl border border-slate-100">
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${displayName}</p>
                            <p class="font-extrabold text-blue-600">$${currentUser.balance.toLocaleString()}</p>
                        </div>
                        <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center">
                            <i data-lucide="user" class="w-4 h-4 text-blue-600"></i>
                        </div>
                    </div>
                    <button onclick="logout()" class="text-slate-400 hover:text-red-500 transition-colors">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                `;
                document.getElementById('reset-btn').classList.toggle('hidden', currentUser.balance >= 1000);
            } else {
                nav.innerHTML = `<button onclick="showAuth()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">立即登录</button>`;
            }
            lucide.createIcons();
        }

        // Update the ping indicator with current latency.
        function updatePing(ms) {
            const dot = document.getElementById('ping-dot');
            const val = document.getElementById('ping-value');
            const indicator = document.getElementById('ping-indicator');
            if (ms === null) {
                val.textContent = '--';
                dot.className = 'w-2 h-2 rounded-full bg-slate-300 transition-colors';
                indicator.className = indicator.className.replace(/text-(green|yellow|orange|red)-\d+/g, '') + ' text-slate-400';
                return;
            }
            val.textContent = ms;
            let dotColor, textColor;
            if (ms < 100) {
                dotColor = 'bg-green-500'; textColor = 'text-green-600';
            } else if (ms < 200) {
                dotColor = 'bg-yellow-500'; textColor = 'text-yellow-600';
            } else if (ms < 500) {
                dotColor = 'bg-orange-500'; textColor = 'text-orange-600';
            } else {
                dotColor = 'bg-red-500'; textColor = 'text-red-600';
            }
            dot.className = `w-2 h-2 rounded-full ${dotColor} transition-colors`;
            indicator.className = `absolute top-6 right-8 flex items-center gap-1.5 ${textColor} font-semibold text-sm tabular-nums transition-colors`;
        }

        let ws = null;
        let wsReconnectDelay = 1000;
        let pingTimer = null;
        let pingSentAt = 0;

        function connectWebSocket() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/api/ws`);

            ws.onopen = () => {
                wsReconnectDelay = 1000;
                // Start periodic ping to measure RTT.
                sendPing();
                pingTimer = setInterval(sendPing, 3000);
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'pong') {
                        updatePing(Math.round(performance.now() - pingSentAt));
                        return;
                    }
                    handleGameState(data);
                } catch (e) {}
            };

            ws.onclose = () => {
                updatePing(null);
                clearInterval(pingTimer);
                setTimeout(() => {
                    wsReconnectDelay = Math.min(wsReconnectDelay * 2, 10000);
                    connectWebSocket();
                }, wsReconnectDelay);
            };

            ws.onerror = () => ws.close();
        }

        function sendPing() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                pingSentAt = performance.now();
                ws.send('{"type":"ping"}');
            }
        }

        function handleGameState(data) {
            gameState = data;

            if (gameState.turnstile_sitekey) window.turnstile_sitekey = gameState.turnstile_sitekey;

            if (gameState.history && gameState.history.length > 0) {
                const latest = gameState.history[0];
                if (lastResultId !== latest.time) {
                    if (lastResultId !== null) {
                        const resultText = latest.outcome === 'win' ? '本轮开奖：胜利 (WIN)' : '本轮开奖：落败 (LOSE)';
                        const resultEl = document.getElementById('last-result');
                        resultEl.innerText = resultText;
                        resultEl.className = `mt-4 font-bold text-lg h-8 ${latest.outcome === 'win' ? 'text-green-500' : 'text-red-500'}`;
                        showToast(resultText, latest.outcome !== 'win');
                        fetchUser();
                    }
                    lastResultId = latest.time;
                }
            }

            updateLeaderboard();
            updateHistory();
            updateCurrentBets();
        }

        function updateFrame() {
            if (gameState.next_res_at) {
                const now = new Date();
                const resAt = new Date(gameState.next_res_at);
                const diff = (resAt - now) / 1000;
                const progress = Math.max(0, Math.min(100, (10 - diff) * 10));

                setProgress(progress);
                document.getElementById('countdown').innerText = diff > 0 ? diff.toFixed(1) : "0.0";
            }
            requestAnimationFrame(updateFrame);
        }

        function updateCurrentBets() {
            const bets = gameState.current_bets || [];
            const list = document.getElementById('current-bets-list');
            const summary = document.getElementById('bets-summary');

            if (bets.length === 0) {
                list.innerHTML = '<p class="text-sm text-slate-300 text-center font-medium">暂无下注</p>';
                summary.textContent = '';
                return;
            }

            const total = bets.reduce((s, b) => s + b.amount, 0);
            summary.textContent = `${bets.length} 人 · 共 $${total.toLocaleString()}`;

            // Find max amount for bar scaling.
            const max = bets[0].amount;
            list.innerHTML = bets.map(b => {
                const barPct = Math.round(b.amount / max * 100);
                return `
                <div class="flex items-center gap-3">
                    <span class="text-sm font-bold text-slate-700 w-24 shrink-0 truncate">${escapeHTML(b.name)}</span>
                    <div class="flex-1 h-6 bg-slate-100 rounded-lg overflow-hidden">
                        <div class="h-full bg-blue-500 rounded-lg transition-all duration-500 flex items-center justify-end pr-2" style="width:${barPct}%">
                            <span class="text-[10px] font-black text-white whitespace-nowrap">$${b.amount.toLocaleString()}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function updateHistory() {
            const container = document.getElementById('history-list');
            // Reverse: API returns newest-first, we want newest on the right.
            const items = (gameState.history || []).slice().reverse();
            const total = items.length;
            container.innerHTML = items.map((h, i) => {
                // Opacity: oldest (i=0) is faintest, newest (i=total-1) is fully opaque.
                // Scale from 0.3 to 1.0
                const opacity = total > 1 ? 0.3 + 0.7 * (i / (total - 1)) : 1;
                const isWin = h.outcome === 'win';
                const isNewest = i === total - 1;
                // Newest item gets a subtle ring to draw the eye.
                const ring = isNewest ? (isWin ? 'ring-2 ring-green-400 ring-offset-1' : 'ring-2 ring-red-400 ring-offset-1') : '';
                const scale = isNewest ? 'scale-110' : '';
                return `
                <div class="flex flex-col items-center gap-1 transition-all" style="opacity:${opacity}">
                    <div class="w-full aspect-square rounded-xl flex items-center justify-center font-black text-xs ${isWin ? 'bg-green-50 text-green-600 border border-green-100' : 'bg-red-50 text-red-600 border border-red-100'} ${ring} ${scale} transition-all">
                        ${isWin ? '胜' : '负'}
                    </div>
                </div>`;
            }).join('');
        }

        function updateLeaderboard() {
            const lb = document.getElementById('leaderboard');
            lb.innerHTML = (gameState.leaderboard || []).map((u, i) => `
                <div class="flex justify-between items-center p-3 rounded-2xl hover:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-4">
                        <span class="w-6 h-6 flex items-center justify-center rounded-lg ${i < 3 ? 'bg-yellow-100 text-yellow-700 font-bold' : 'text-slate-400 font-medium'} text-xs">
                            ${i + 1}
                        </span>
                        <span class="font-bold text-slate-700 truncate max-w-[120px]">${escapeHTML(u.name)}</span>
                    </div>
                    <span class="font-black text-blue-600">$${u.balance.toLocaleString()}</span>
                </div>
            `).join('');
        }

        function setBetPercent(pct) {
            if (!currentUser) return;
            activeBetPercent = pct;
            applyBetAmount();
            highlightPercentBtn();
        }

        // Recalculate bet amount from activeBetPercent and sync the payout preview.
        function applyBetAmount() {
            if (!currentUser || activeBetPercent === null) return;
            const input = document.getElementById('bet-amount');
            input.value = Math.floor(currentUser.balance * activeBetPercent / 100);
            input.dispatchEvent(new Event('input'));
        }

        // Highlight the active percentage button.
        function highlightPercentBtn() {
            document.querySelectorAll('#percent-btns button').forEach(btn => {
                const pct = parseInt(btn.dataset.pct);
                if (pct === activeBetPercent) {
                    btn.className = 'py-2 rounded-xl bg-blue-600 text-white text-xs font-bold transition-all';
                } else {
                    btn.className = pct === 100
                        ? 'py-2 rounded-xl bg-slate-900 text-white text-xs font-bold hover:bg-slate-800 transition-all'
                        : 'py-2 rounded-xl bg-white border border-slate-100 hover:border-blue-200 hover:bg-blue-50 text-xs font-bold transition-all';
                }
            });
        }

        async function placeBet() {
            if (!currentUser) return showAuth();
            const btn = document.getElementById('bet-btn');
            btn.disabled = true;
            const amount = parseInt(document.getElementById('bet-amount').value);
            const res = await fetch('/api/bet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount })
            });
            if (res.ok) {
                showToast(`成功下注 $${amount.toLocaleString()}`);
                await fetchUser();
            } else {
                showToast(await res.text(), true);
            }
            btn.disabled = false;
        }

        async function resetBalance() {
            const res = await fetch('/api/reset', { method: 'POST' });
            if (res.ok) {
                showToast("余额已重置为 $1,000");
                await fetchUser();
            }
        }

        function showAuth() {
            document.getElementById('auth-modal').classList.remove('hidden');
            if (!window._turnstileRendered) {
                window._turnstileRendered = true;
                turnstile.render('#turnstile-container', {
                    sitekey: window.turnstile_sitekey,
                    callback: (token) => { window.tsToken = token; }
                });
            }
        }
        async function startRegister() {
            const email = document.getElementById('email-input').value;
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, turnstile_token: window.tsToken })
            });
            if (res.ok) {
                showToast("验证码已发送，请查收邮件");
                document.getElementById('register-step').classList.add('hidden');
                document.getElementById('verify-step').classList.remove('hidden');
            } else {
                showToast(await res.text(), true);
            }
        }
        async function verifyCode() {
            const res = await fetch('/api/auth/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email-input').value,
                    code: document.getElementById('otp-input').value
                })
            });
            if (res.ok) {
                showToast("登录成功");
                location.reload();
            } else {
                showToast("验证码校验失败", true);
            }
        }
        function logout() {
            document.cookie = "token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            location.reload();
        }

        init();
    </script>
</body>
</html>
